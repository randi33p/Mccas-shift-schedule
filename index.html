<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Schedule</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b96;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
    --radius: 8px; --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523;
      --text: #f0efe9; --text2: #9b9b96; --text3: #6b6b67;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    }
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 0.5px solid var(--border); }
  header h1 { font-size: 15px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 10px 24px; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .schedule-wrap { overflow: auto; padding: 16px 20px 60px; }
  .grid-header { display: grid; grid-template-columns: 56px repeat(5, 1fr); position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 0.5px solid var(--border); padding-bottom: 8px; }
  .day-header { text-align: center; padding: 4px 0; }
  .day-name { font-size: 13px; font-weight: 500; }
  .day-hours { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .grid-body { display: grid; grid-template-columns: 56px repeat(5, 1fr); }
  .time-col { position: relative; }
  .tick { position: absolute; right: 6px; font-size: 10px; color: var(--text3); transform: translateY(-50%); white-space: nowrap; }
  .day-col { position: relative; border-left: 0.5px solid var(--border); }
  .hour-line { position: absolute; left: 0; right: 0; height: 0.5px; background: var(--border); pointer-events: none; }
  .half-line { position: absolute; left: 0; right: 0; height: 0.5px; background: var(--border); opacity: 0.35; pointer-events: none; }
  .task-block { position: absolute; left: 3px; right: 3px; border-radius: var(--radius); padding: 4px 7px; overflow: hidden; }
  .block-name { font-size: 10px; font-weight: 500; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
  .block-time { font-size: 9px; margin-top: 2px; opacity: 0.7; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Shift schedule — Clyde North McDonald's</h1>
    <div class="header-sub">2:00 AM start · Wednesday to Sunday</div>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#C0DD97"></div>Bins / outdoor</div>
  <div class="legend-item"><div class="legend-dot" style="background:#B5D4F4"></div>Drive-Thru</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F4C0D1"></div>Bathroom – public</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ED93B1"></div>Bathroom – staff (full)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FBEAF0"></div>Bathroom – staff (sweep)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FAC775"></div>Dining area</div>
  <div class="legend-item"><div class="legend-dot" style="background:#D3D1C7"></div>Extra / walls</div>
</div>

<div class="schedule-wrap">
  <div class="grid-header">
    <div></div>
    <div class="day-header"><div class="day-name">Wed</div><div class="day-hours">2:00 – 6:30</div></div>
    <div class="day-header"><div class="day-name">Thu</div><div class="day-hours">2:00 – 6:15</div></div>
    <div class="day-header"><div class="day-name">Fri</div><div class="day-hours">2:00 – 6:30</div></div>
    <div class="day-header"><div class="day-name">Sat</div><div class="day-hours">2:00 – 6:15</div></div>
    <div class="day-header"><div class="day-name">Sun</div><div class="day-hours">2:00 – 5:30</div></div>
  </div>
  <div class="grid-body" id="gridBody"></div>
</div>

<script>
const PX = 2.8;
const START = 2 * 60;
const END = 6 * 60 + 30;
const TOTAL = (END - START) * PX;

const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

const COLORS = {
  bins:      isDark ? { bg:'#27500A', fg:'#C0DD97' } : { bg:'#EAF3DE', fg:'#27500A' },
  drivethru: isDark ? { bg:'#0C447C', fg:'#B5D4F4' } : { bg:'#E6F1FB', fg:'#0C447C' },
  bathpub:   isDark ? { bg:'#72243E', fg:'#F4C0D1' } : { bg:'#FBEAF0', fg:'#72243E' },
  bathstaff: isDark ? { bg:'#4B1528', fg:'#ED93B1' } : { bg:'#ED93B1', fg:'#4B1528' },
  bathquick: isDark ? { bg:'#993556', fg:'#FBEAF0' } : { bg:'#FBEAF0', fg:'#993556' },
  dining:    isDark ? { bg:'#633806', fg:'#FAC775' } : { bg:'#FAEEDA', fg:'#633806' },
  extra:     isDark ? { bg:'#2C2C2A', fg:'#D3D1C7' } : { bg:'#F1EFE8', fg:'#444441' },
};

const WED_FRI = [
  { name:'Empty & replace bins',         start:'2:00', end:'2:15', c:'bins' },
  { name:'Wipe chairs & tables',         start:'2:15', end:'2:45', c:'dining' },
  { name:'Carpark & Drive-Thru rubbish', start:'2:45', end:'2:55', c:'bins' },
  { name:'Drive-Thru glass cleaning',    start:'2:55', end:'3:25', c:'drivethru' },
  { name:'Bathroom – public',            start:'3:25', end:'3:45', c:'bathpub' },
  { name:'Bathroom – staff',             start:'3:45', end:'4:00', c:'bathstaff' },
  { name:'Bathroom mopping',             start:'4:00', end:'4:30', c:'bathpub' },
  { name:'Dining area mopping',          start:'4:30', end:'5:30', c:'dining' },
  { name:'Dining area glass cleaning',   start:'5:30', end:'6:00', c:'dining' },
  { name:'Extra / walls',                start:'6:00', end:'6:30', c:'extra' },
];

const THU_SAT = [
  { name:'Empty & replace bins',         start:'2:00', end:'2:15', c:'bins' },
  { name:'Wipe chairs & tables',         start:'2:15', end:'2:45', c:'dining' },
  { name:'Carpark & Drive-Thru rubbish', start:'2:45', end:'2:55', c:'bins' },
  { name:'Drive-Thru glass cleaning',    start:'2:55', end:'3:25', c:'drivethru' },
  { name:'Bathroom – public',            start:'3:25', end:'3:45', c:'bathpub' },
  { name:'Bathroom mopping',             start:'3:45', end:'4:15', c:'bathpub' },
  { name:'Dining area mopping',          start:'4:15', end:'5:15', c:'dining' },
  { name:'Dining area glass cleaning',   start:'5:15', end:'5:45', c:'dining' },
  { name:'Extra / walls',                start:'5:45', end:'6:15', c:'extra' },
];

const SUN = [
  { name:'Empty & replace bins',         start:'2:00', end:'2:15', c:'bins' },
  { name:'Wipe chairs & tables',         start:'2:15', end:'2:45', c:'dining' },
  { name:'Carpark & Drive-Thru rubbish', start:'2:45', end:'2:55', c:'bins' },
  { name:'Drive-Thru glass cleaning',    start:'2:55', end:'3:25', c:'drivethru' },
  { name:'Bathroom – public (full)',     start:'3:25', end:'3:45', c:'bathpub' },
  { name:'Bathroom – staff (sweep)',     start:'3:45', end:'3:55', c:'bathquick' },
  { name:'Bathroom mopping (public)',    start:'3:55', end:'4:10', c:'bathpub' },
  { name:'Dining area mopping',          start:'4:10', end:'5:10', c:'dining' },
  { name:'Dining area glass cleaning',   start:'5:10', end:'5:20', c:'dining' },
  { name:'Extra / walls',                start:'5:20', end:'5:30', c:'extra' },
];

const DAYS = [
  { key:'wed', tasks: WED_FRI },
  { key:'thu', tasks: THU_SAT },
  { key:'fri', tasks: WED_FRI },
  { key:'sat', tasks: THU_SAT },
  { key:'sun', tasks: SUN },
];

function toMins(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function fmt(t) {
  const [h,m] = t.split(':').map(Number);
  const s = h < 12 ? 'am' : 'pm';
  const hd = h % 12 || 12;
  return m === 0 ? `${hd}${s}` : `${hd}:${String(m).padStart(2,'0')}${s}`;
}

const body = document.getElementById('gridBody');

const timeCol = document.createElement('div');
timeCol.className = 'time-col';
timeCol.style.cssText = `position:relative;height:${TOTAL}px;`;
for (let m = START; m <= END; m += 60) {
  const top = (m - START) * PX;
  const tick = document.createElement('div');
  tick.className = 'tick';
  tick.style.top = top + 'px';
  const h = m / 60;
  tick.textContent = h < 12 ? `${h}am` : (h === 12 ? '12pm' : `${h-12}pm`);
  timeCol.appendChild(tick);
}
body.appendChild(timeCol);

DAYS.forEach(({ key, tasks }) => {
  const dayCol = document.createElement('div');
  dayCol.className = `day-col col-${key}`;
  dayCol.style.cssText = `position:relative;height:${TOTAL}px;`;

  for (let m = START; m <= END; m += 60) {
    const line = document.createElement('div');
    line.className = 'hour-line';
    line.style.top = ((m - START) * PX) + 'px';
    dayCol.appendChild(line);
    if (m < END) {
      const half = document.createElement('div');
      half.className = 'half-line';
      half.style.top = ((m + 30 - START) * PX) + 'px';
      dayCol.appendChild(half);
    }
  }

  tasks.forEach(t => {
    const sMin = toMins(t.start) - START;
    const eMin = toMins(t.end) - START;
    const dur = eMin - sMin;
    const top = sMin * PX + 2;
    const height = Math.max(dur * PX - 4, 14);
    const c = COLORS[t.c];

    const block = document.createElement('div');
    block.className = 'task-block';
    block.style.cssText = `top:${top}px;height:${height}px;background:${c.bg};color:${c.fg};`;

    const name = document.createElement('div');
    name.className = 'block-name';
    name.textContent = t.name;
    block.appendChild(name);

    if (height > 22) {
      const time = document.createElement('div');
      time.className = 'block-time';
      time.textContent = `${fmt(t.start)} – ${fmt(t.end)}`;
      block.appendChild(time);
    }

    dayCol.appendChild(block);
  });

  body.appendChild(dayCol);
});
</script>
</body>
</html>
